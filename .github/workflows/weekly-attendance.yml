name: Weekly Attendance Report

on:
  schedule:
    # Every Monday at 14:00 UTC = 9:00 AM ET (10:00 AM EDT)
    - cron: '0 14 * * 1'
  workflow_dispatch:   # Allow manual trigger from GitHub Actions UI

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt playwright

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run weekly attendance automation
        env:
          DATAWATCH_USERNAME:  ${{ secrets.DATAWATCH_USERNAME }}
          DATAWATCH_PASSWORD:  ${{ secrets.DATAWATCH_PASSWORD }}
          AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          REPORT_FROM_EMAIL:   ${{ secrets.REPORT_FROM_EMAIL }}
          REPORT_TO_EMAILS:    ${{ secrets.REPORT_TO_EMAILS }}
          TEAMS_WEBHOOK_URL:   ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: python weekly_report.py
