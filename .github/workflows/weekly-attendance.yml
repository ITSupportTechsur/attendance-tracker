name: Weekly Attendance Report

on:
  schedule:
    # Every Monday at 13:30 UTC = 9:30 AM EDT (adjusts to 8:30 AM EST in winter)
    - cron: '30 13 * * 1'
  workflow_dispatch:
    inputs:
      recipients:
        description: 'Override recipient emails (comma-separated). Leave blank to use the REPORT_TO_EMAILS secret.'
        required: false
        default: ''

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt playwright

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run weekly attendance automation
        env:
          DATAWATCH_USERNAME:  ${{ secrets.DATAWATCH_USERNAME }}
          DATAWATCH_PASSWORD:  ${{ secrets.DATAWATCH_PASSWORD }}
          AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          REPORT_FROM_EMAIL:   ${{ secrets.REPORT_FROM_EMAIL }}
          REPORT_TO_EMAILS:    ${{ inputs.recipients != '' && inputs.recipients || secrets.REPORT_TO_EMAILS }}
          TEAMS_WEBHOOK_URL:   ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: python weekly_report.py
