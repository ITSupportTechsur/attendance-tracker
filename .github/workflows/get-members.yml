name: Get Chat Members
on:
  workflow_dispatch:
jobs:
  get-members:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install msal requests
      - name: Fetch chat members
        env:
          AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          python3 -c "
          import os, msal, requests
          app = msal.ConfidentialClientApplication(
              os.environ['AZURE_CLIENT_ID'],
              authority='https://login.microsoftonline.com/' + os.environ['AZURE_TENANT_ID'],
              client_credential=os.environ['AZURE_CLIENT_SECRET'])
          token = app.acquire_token_for_client(scopes=['https://graph.microsoft.com/.default'])['access_token']
          resp = requests.get('https://graph.microsoft.com/v1.0/chats/19:b98f42b8806d40d79914e59fa66953de@thread.v2/members', headers={'Authorization': 'Bearer ' + token})
          members = resp.json().get('value', [])
          print('Total members:', len(members))
          for m in members:
              print(' ', m.get('displayName','?'), '|', m.get('email',''))
          "
