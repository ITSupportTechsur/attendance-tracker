name: D3000 Roster Probe (one-off diagnostic)

# Manual only. Logs into D3000, opens CardHolder/Index, and dumps the cardholder
# roster structure (headers, sample rows, export link, pagination) to the run log so
# we can build the full 3-source name audit. Read-only — emails/sends nothing.
# DELETE this workflow + probe_cardholders() once the roster fetch is built.

on:
  workflow_dispatch:

jobs:
  roster-probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt playwright
      - run: playwright install chromium --with-deps
      - name: Probe D3000 cardholder roster
        env:
          DATAWATCH_USERNAME:  ${{ secrets.DATAWATCH_USERNAME }}
          DATAWATCH_PASSWORD:  ${{ secrets.DATAWATCH_PASSWORD }}
          AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          REPORT_FROM_EMAIL:   ${{ secrets.REPORT_FROM_EMAIL }}
          REPORT_TO_EMAILS:    ${{ secrets.REPORT_TO_EMAILS }}
          ROSTER_PROBE: 'true'
        run: python weekly_report.py
